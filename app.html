<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StatsProno — Mon espace</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#00E87A;--green-dim:#00b85f;
  --dark:#080C0A;--dark2:#0f1510;--dark3:#161d15;
  --card:#111711;--border:#1e2b1e;
  --text:#e8ede8;--muted:#6b7d6b;
  --red:#FF4444;--amber:#FFB800;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;min-height:100vh}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;background:rgba(8,12,10,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--green);letter-spacing:-0.5px;text-decoration:none}
.logo span{color:var(--text)}
.nav-links{display:flex;align-items:center;gap:24px}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--green)}
.signout-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.signout-btn:hover{border-color:var(--red);color:var(--red)}

.page{max-width:680px;margin:0 auto;padding:120px 24px 80px}

/* LOGIN VIEW */
.login-box{max-width:420px;margin:80px auto;text-align:center}
.login-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:12px;letter-spacing:-0.5px}
.login-sub{color:var(--muted);font-size:15px;margin-bottom:32px;font-weight:300}
.login-form{display:flex;flex-direction:column;gap:12px}
.email-input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.email-input::placeholder{color:var(--muted)}
.email-input:focus{border-color:rgba(0,232,122,0.4)}
.submit-btn{background:var(--green);color:var(--dark);border:none;border-radius:10px;padding:14px 22px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.submit-btn:hover{background:var(--green-dim)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-note{font-size:12px;color:var(--muted);margin-top:8px}
.login-msg{font-size:14px;padding:14px 16px;border-radius:10px;margin-top:16px;display:none}
.login-msg.success{background:rgba(0,232,122,0.1);border:1px solid rgba(0,232,122,0.25);color:var(--green);display:block}
.login-msg.error{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.25);color:var(--red);display:block}

/* APP VIEW */
.section-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:20px;letter-spacing:-0.3px}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:32px}
.form-grid{display:grid;gap:10px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus{border-color:rgba(0,232,122,0.4)}
input::placeholder{color:var(--muted)}
select{cursor:pointer;appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%236b7d6b" stroke-width="1.5" fill="none"/></svg>');background-repeat:no-repeat;background-position:right 14px center;padding-right:32px}

.bookmaker-row{display:flex;gap:8px;margin-bottom:4px}
.bookmaker-btn{flex:1;background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:11px 8px;color:var(--muted);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;text-align:center}
.bookmaker-btn:hover{border-color:rgba(0,232,122,0.3)}
.bookmaker-btn.selected{background:rgba(0,232,122,0.1);border-color:var(--green);color:var(--green)}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.stat-value.pos{color:var(--green)}
.stat-value.neg{color:var(--red)}

.picks-list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.pick-row{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.pick-row:last-child{border-bottom:none}
.pick-match{font-size:14px;margin-bottom:3px}
.pick-meta{font-size:12px;color:var(--muted)}
.pick-status{font-size:12px;font-weight:500;padding:5px 12px;border-radius:7px;white-space:nowrap}
.status-won{background:rgba(0,232,122,0.1);color:var(--green)}
.status-lost{background:rgba(255,68,68,0.1);color:var(--red)}
.status-pending{background:var(--dark2);color:var(--muted)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

.loader{text-align:center;padding:80px 20px;color:var(--muted)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Stats<span>Prono</span></a>
  <div class="nav-links">
    <a href="app.html" class="active">Mon espace</a>
    <a href="classement.html">Classement</a>
    <a href="devenir-tipster.html">Devenir tipster</a>
    <button class="signout-btn" id="signoutBtn" style="display:none">Se déconnecter</button>
  </div>
</nav>

<div class="page">

  <div id="loadingView" class="loader">Chargement...</div>

  <div id="loginView" style="display:none">
    <div class="login-box">
      <h1 class="login-title">Connexion</h1>
      <p class="login-sub">Entre ton email, on t'envoie un lien pour accéder à ton espace. Pas de mot de passe à retenir.</p>
      <form class="login-form" id="loginForm">
        <input type="email" class="email-input" id="loginEmail" placeholder="ton@email.com" required autocomplete="off"/>
        <button type="submit" class="submit-btn" id="loginSubmit">Recevoir mon lien d'accès</button>
      </form>
      <div class="login-msg" id="loginMsg"></div>
    </div>
  </div>

  <div id="appView" style="display:none">

    <h2 class="section-title">Nouveau pari</h2>
    <div class="card">
      <form class="form-grid" id="pickForm">
        <input type="text" id="matchInput" placeholder="Match (ex: PSG vs Marseille)" required/>
        <div>
          <div class="bookmaker-row" id="bookmakerRow">
            <button type="button" class="bookmaker-btn" data-bk="Winamax">Winamax</button>
            <button type="button" class="bookmaker-btn" data-bk="Unibet">Unibet</button>
            <button type="button" class="bookmaker-btn" data-bk="Betclic">Betclic</button>
          </div>
        </div>
        <div class="form-row">
          <select id="betTypeInput" required>
            <option value="" disabled selected>Type de pari</option>
            <option value="1">Victoire domicile (1)</option>
            <option value="X">Match nul (X)</option>
            <option value="2">Victoire extérieur (2)</option>
            <option value="BTTS">Les 2 équipes marquent</option>
            <option value="+2.5">Plus de 2.5 buts</option>
            <option value="-2.5">Moins de 2.5 buts</option>
          </select>
          <input type="number" id="oddsInput" placeholder="Cote (ex: 1.85)" step="0.01" min="1" required/>
        </div>
        <input type="number" id="stakeInput" placeholder="Mise (en unités, ex: 1)" step="0.5" min="0.5" value="1" required/>
        <button type="submit" class="submit-btn" id="pickSubmit">Ajouter le pari</button>
      </form>
    </div>

    <h2 class="section-title">Ta performance</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">ROI global</div>
        <div class="stat-value" id="statRoi">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Réussite</div>
        <div class="stat-value" id="statWinRate">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Paris</div>
        <div class="stat-value" id="statCount">—</div>
      </div>
    </div>

    <h2 class="section-title">Derniers paris</h2>
    <div class="picks-list" id="picksList">
      <div class="empty-state">Aucun pari enregistré pour l'instant.</div>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL = 'https://lyfhbmponpdkkfbwkxkx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_jgqVoO3xdkHa6WepwtF6UQ_svlUMC03';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let selectedBookmaker = null;

const loadingView = document.getElementById('loadingView');
const loginView = document.getElementById('loginView');
const appView = document.getElementById('appView');
const signoutBtn = document.getElementById('signoutBtn');

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  loadingView.style.display = 'none';
  loginView.style.display = 'block';
  appView.style.display = 'none';
  signoutBtn.style.display = 'none';
}

async function showApp() {
  loadingView.style.display = 'none';
  loginView.style.display = 'none';
  appView.style.display = 'block';
  signoutBtn.style.display = 'inline-block';
  await loadStats();
  await loadPicks();
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const btn = document.getElementById('loginSubmit');
  const msg = document.getElementById('loginMsg');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';
  msg.className = 'login-msg';

  const { error } = await sb.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.href }
  });

  btn.disabled = false;
  btn.textContent = "Recevoir mon lien d'accès";

  if (error) {
    msg.className = 'login-msg error';
    msg.textContent = "Une erreur s'est produite. Vérifie ton email et réessaie.";
  } else {
    msg.className = 'login-msg success';
    msg.textContent = "Lien envoyé ! Vérifie ta boîte mail (et tes spams) et clique sur le lien pour accéder à ton espace.";
  }
});

signoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  currentUser = null;
  showLogin();
});

document.querySelectorAll('.bookmaker-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bookmaker-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedBookmaker = btn.dataset.bk;
  });
});

document.getElementById('pickForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!selectedBookmaker) {
    alert('Choisis un bookmaker avant de continuer.');
    return;
  }
  const btn = document.getElementById('pickSubmit');
  btn.disabled = true;
  btn.textContent = 'Ajout en cours...';

  const matchLabel = document.getElementById('matchInput').value;
  const betType = document.getElementById('betTypeInput').value;
  const odds = parseFloat(document.getElementById('oddsInput').value);
  const stake = parseFloat(document.getElementById('stakeInput').value);

  const { error } = await supabase.from('picks').insert({
    user_id: currentUser.id,
    bookmaker: selectedBookmaker,
    bet_type: betType + ' — ' + matchLabel,
    odds: odds,
    stake: stake,
    result: 'pending'
  });

  btn.disabled = false;
  btn.textContent = 'Ajouter le pari';

  if (error) {
    alert("Erreur lors de l'ajout du pari. Réessaie.");
    console.error(error);
  } else {
    document.getElementById('pickForm').reset();
    document.querySelectorAll('.bookmaker-btn').forEach(b => b.classList.remove('selected'));
    selectedBookmaker = null;
    await loadStats();
    await loadPicks();
  }
});

async function loadStats() {
  const { data, error } = await supabase
    .from('users')
    .select('roi, win_rate, nb_picks')
    .eq('id', currentUser.id)
    .single();

  if (error || !data) return;

  const roiEl = document.getElementById('statRoi');
  const roi = data.roi || 0;
  roiEl.textContent = (roi > 0 ? '+' : '') + roi.toFixed(1) + '%';
  roiEl.className = 'stat-value ' + (roi > 0 ? 'pos' : roi < 0 ? 'neg' : '');

  document.getElementById('statWinRate').textContent = (data.win_rate || 0).toFixed(0) + '%';
  document.getElementById('statCount').textContent = data.nb_picks || 0;
}

async function loadPicks() {
  const { data, error } = await supabase
    .from('picks')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(10);

  const list = document.getElementById('picksList');

  if (error || !data || data.length === 0) {
    list.innerHTML = '<div class="empty-state">Aucun pari enregistré pour l\'instant.</div>';
    return;
  }

  list.innerHTML = data.map(pick => {
    let statusClass = 'status-pending';
    let statusText = 'En attente';
    if (pick.result === 'won') { statusClass = 'status-won'; statusText = 'Gagné'; }
    if (pick.result === 'lost') { statusClass = 'status-lost'; statusText = 'Perdu'; }
    if (pick.result === 'void') { statusClass = 'status-pending'; statusText = 'Annulé'; }

    return `
      <div class="pick-row">
        <div>
          <div class="pick-match">${pick.bet_type}</div>
          <div class="pick-meta">${pick.bookmaker} · cote ${pick.odds} · ${pick.stake} unité${pick.stake > 1 ? 's' : ''}</div>
        </div>
        <span class="pick-status ${statusClass}">${statusText}</span>
      </div>
    `;
  }).join('');
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user;
    showApp();
  }
});

init();
</script>

</body>
</html>
